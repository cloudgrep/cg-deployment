apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudgrep-backdoor-secrets
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: cloudgrep-backdoor-secrets
  data:
    - secretKey: PORT
      remoteRef:
        key: DEV__BACKDOOR__PORT
    - secretKey: ENVIRONMENT
      remoteRef:
        key: DEV__BACKDOOR__ENVIRONMENT
    - secretKey: MONGODB_URI
      remoteRef:
        key: DEV__BACKDOOR__MONGODB_URI
    - secretKey: MONGODB_NAME
      remoteRef:
        key: DEV__BACKDOOR__MONGODB_NAME
    - secretKey: JWT_SECRET
      remoteRef:
        key: DEV__BACKDOOR__JWT_SECRET
    - secretKey: GOOGLE_CLIENT_ID
      remoteRef:
        key: DEV__BACKDOOR__GOOGLE_CLIENT_ID
    - secretKey: GOOGLE_CLIENT_SECRET
      remoteRef:
        key: DEV__BACKDOOR__GOOGLE_CLIENT_SECRET
    - secretKey: ALLOWED_ORIGINS
      remoteRef:
        key: DEV__BACKDOOR__ALLOWED_ORIGINS
    - secretKey: SESSION_TTL
      remoteRef:
        key: DEV__BACKDOOR__SESSION_TTL
    - secretKey: REDIS_ADDR
      remoteRef:
        key: DEV__BACKDOOR__REDIS_ADDR
    - secretKey: REDIS_USERNAME
      remoteRef:
        key: DEV__BACKDOOR__REDIS_USERNAME
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: DEV__BACKDOOR__REDIS_PASSWORD
    - secretKey: STREAMA_TOKEN_SECRET
      remoteRef:
        key: DEV__BACKDOOR__STREAMA_TOKEN_SECRET
    - secretKey: OPENSEARCH_ADDRESS
      remoteRef:
        key: DEV__BACKDOOR__OPENSEARCH_ADDRESS
    - secretKey: OPENSEARCH_USERNAME
      remoteRef:
        key: DEV__BACKDOOR__OPENSEARCH_USERNAME
    - secretKey: OPENSEARCH_PASSWORD
      remoteRef:
        key: DEV__BACKDOOR__OPENSEARCH_PASSWORD
    - secretKey: OPENSEARCH_USE_TLS
      remoteRef:
        key: DEV__BACKDOOR__OPENSEARCH_USE_TLS
    - secretKey: OPENSEARCH_INSECURE_SKIP_VERIFY
      remoteRef:
        key: DEV__BACKDOOR__OPENSEARCH_INSECURE_SKIP_VERIFY
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: DEV__BACKDOOR__AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: DEV__BACKDOOR__AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_REGION
      remoteRef:
        key: DEV__BACKDOOR__AWS_REGION
    - secretKey: S3_BUCKET
      remoteRef:
        key: DEV__BACKDOOR__S3_BUCKET
    - secretKey: S3_PROFILE_PICTURES_BUCKET
      remoteRef:
        key: DEV__BACKDOOR__S3_PROFILE_PICTURES_BUCKET
    - secretKey: RESEND_API_KEY
      remoteRef:
        key: DEV__BACKDOOR__RESEND_API_KEY
    - secretKey: RESEND_FROM_EMAIL
      remoteRef:
        key: DEV__BACKDOOR__RESEND_FROM_EMAIL
    - secretKey: RESEND_FROM_NAME
      remoteRef:
        key: DEV__BACKDOOR__RESEND_FROM_NAME
    - secretKey: RESEND_REPLY_TO_EMAIL
      remoteRef:
        key: DEV__BACKDOOR__RESEND_REPLY_TO_EMAIL
    - secretKey: MANAGER_BASE_URL
      remoteRef:
        key: DEV__BACKDOOR__MANAGER_BASE_URL
    - secretKey: PROCTOR_CONSUMER_ENABLED
      remoteRef:
        key: DEV__BACKDOOR__PROCTOR_CONSUMER_ENABLED
