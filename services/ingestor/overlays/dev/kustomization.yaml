apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cloudgrep
namePrefix: dev-

resources:
  - ../../base

images:
  - name: us-docker.pkg.dev/cloudgrep/cloudgrep-images/ingestor
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: ingestor
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 50m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 64Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 128Mi
