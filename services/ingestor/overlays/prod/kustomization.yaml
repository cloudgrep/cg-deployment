apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cloudgrep
namePrefix: prod-

resources:
  - ../../base

images:
  - name: us-docker.pkg.dev/cloudgrep/cloudgrep-images/ingestor
    newTag: latest

patches:
  - target:
      kind: Deployment
      name: ingestor
    patch: |
      - op: replace
        path: /spec/replicas
        value: 0
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 128Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 256Mi
